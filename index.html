<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আয় ব্যয় - প্রো অ্যাপ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .modal { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100 pb-24">

    <header class="bg-green-700 text-white p-6 pb-12 rounded-b-[2rem] shadow-xl">
        <h1 class="text-2xl font-bold">আয় ব্যয়</h1>
    </header>

    <section class="px-4 -mt-8 grid grid-cols-3 gap-2">
        <div class="bg-white p-3 rounded-2xl shadow text-center border-t-4 border-green-500">
            <p class="text-[10px] text-gray-500">ব্যালেন্স</p>
            <h2 id="totalBalance" class="text-sm font-bold text-green-700">৳০</h2>
        </div>
        <div class="bg-white p-3 rounded-2xl shadow text-center border-t-4 border-red-500">
            <p class="text-[10px] text-gray-500">খরচ</p>
            <h2 id="totalExpense" class="text-sm font-bold text-red-600">৳০</h2>
        </div>
        <div class="bg-white p-3 rounded-2xl shadow text-center border-t-4 border-blue-500">
            <p class="text-[10px] text-gray-500">অবশিষ্ট</p>
            <h2 id="remainingBalance" class="text-sm font-bold text-blue-600">৳০</h2>
        </div>
    </section>

    <main class="px-4 mt-6">
        <h3 class="font-bold text-gray-700 mb-4">দৈনিক খরচের তালিকা</h3>
        <div id="expenseList" class="space-y-3">
            </div>
    </main>

    <button onclick="toggleModal(true)" class="fixed bottom-20 right-6 bg-green-600 text-white w-16 h-16 rounded-full shadow-2xl text-3xl">+</button>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-4 shadow-lg">
        <button class="text-green-700">হোম</button>
        <button class="text-gray-400">দেনা-পাওনা</button>
        <button class="text-gray-400">রিপোর্ট</button>
        <button class="text-gray-400">সেটিংস</button>
    </nav>

    <div id="expenseModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold mb-4">নতুন খরচ যোগ করুন</h2>
            <input type="date" id="date" class="w-full border p-3 rounded-xl mb-3">
            <input type="number" id="amount" placeholder="টাকার পরিমাণ" class="w-full border p-3 rounded-xl mb-3">
            <textarea id="desc" placeholder="বিবরণ..." class="w-full border p-3 rounded-xl mb-3"></textarea>
            <div class="flex gap-2">
                <button onclick="toggleModal(false)" class="w-full py-3 bg-gray-200 rounded-xl">বাতিল</button>
                <button onclick="saveData()" class="w-full py-3 bg-green-600 text-white rounded-xl">সেভ করুন</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        // আপনার Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDZ2cE6sxr9T0zb5tXmfumJhwghL_XSJes",
            authDomain: "ay-byay-c2d3f.firebaseapp.com",
            projectId: "ay-byay-c2d3f",
            storageBucket: "ay-byay-c2d3f.firebasestorage.app",
            messagingSenderId: "20199204971",
            appId: "1:20199204971:web:2279af3038f6946bcd292e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI কন্ট্রোল
        window.toggleModal = (show) => {
            document.getElementById('expenseModal').classList.toggle('hidden', !show);
        };

        // ডাটা সেভ ফাংশন
        window.saveData = async () => {
            const date = document.getElementById('date').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const desc = document.getElementById('desc').value;

            if(!date || !amount || !desc) return alert("সব ঘর পূরণ করুন!");

            await addDoc(collection(db, "expenses"), { date, amount, desc, createdAt: serverTimestamp() });
            alert("সফলভাবে সেভ হয়েছে!");
            toggleModal(false);
        };

        // রিয়েল-টাইম ডাটা আপডেট
        onSnapshot(query(collection(db, "expenses"), orderBy("createdAt", "desc")), (snapshot) => {
            const list = document.getElementById('expenseList');
            list.innerHTML = "";
            let total = 0;
            snapshot.forEach(doc => {
                const item = doc.data();
                total += item.amount;
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                        <div>
                            <p class="font-bold">${item.desc}</p>
                            <p class="text-xs text-gray-400">${item.date}</p>
                        </div>
                        <span class="font-bold text-red-500">৳${item.amount}</span>
                    </div>
                `;
            });
            document.getElementById('totalExpense').innerText = `৳${total}`;
            document.getElementById('remainingBalance').innerText = `৳${20000 - total}`;
        });
    </script>
</body>
</html>
