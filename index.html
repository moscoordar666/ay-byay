<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আয় ব্যয় - প্রোডাকশন রেডি</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-gray-100 pb-20">

    <div class="bg-green-700 text-white p-6 rounded-b-3xl shadow-lg">
        <h1 class="text-2xl font-bold text-center">আয় ব্যয়</h1>
    </div>

    <div class="grid grid-cols-3 gap-2 px-4 -mt-8">
        <div class="bg-white p-4 rounded-2xl shadow-md text-center border-b-4 border-green-500">
            <p class="text-[10px] text-gray-500">ব্যালান্স</p>
            <p class="font-bold text-green-700">৳২০,০০০</p>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-md text-center border-b-4 border-red-500">
            <p class="text-[10px] text-gray-500">খরচ</p>
            <p class="font-bold text-red-600">৳৭,৩৫০</p>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-md text-center border-b-4 border-blue-500">
            <p class="text-[10px] text-gray-500">অবশিষ্ট</p>
            <p class="font-bold text-blue-600">৳১২,৬৫০</p>
        </div>
    </div>

    <div class="px-4 mt-6">
        <h2 class="font-bold mb-3 text-gray-700">দৈনিক খরচের তালিকা</h2>
        <div id="expenseList" class="space-y-3">
            </div>
    </div>

    <button id="addBtn" class="fixed bottom-20 right-6 bg-green-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl hover:scale-110 transition">
        +
    </button>

    <div class="fixed bottom-0 w-full bg-white p-4 flex justify-between px-8 border-t shadow-inner">
        <button class="text-green-700 font-bold">হোম</button>
        <button class="text-gray-400">দেনা-পাওনা</button>
        <button class="text-gray-400">রিপোর্ট</button>
        <button class="text-gray-400">সেটিংস</button>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        // ডাটা রেন্ডার করার ফাংশন
        const q = query(collection(db, "expenses"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('expenseList');
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const item = doc.data();
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                        <div>
                            <p class="font-bold text-sm">${item.description}</p>
                            <p class="text-[10px] text-gray-400">${item.date}</p>
                        </div>
                        <span class="font-bold text-red-500">৳${item.amount}</span>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
