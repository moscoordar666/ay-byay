<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আয় ব্যয় - প্রো অ্যাপ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-gray-100 pb-20">

    <header class="bg-green-700 text-white p-6 pb-12 shadow-xl">
        <h1 class="text-2xl font-bold">আয় ব্যয়</h1>
        <div class="mt-4 flex gap-2">
            <input type="number" id="budgetInput" placeholder="মাসিক বাজেট (৳)" class="w-full p-2 rounded-lg text-black text-sm">
            <button onclick="setBudget()" class="bg-green-800 px-4 py-2 rounded-lg text-sm">সেট</button>
        </div>
    </header>

    <section class="px-4 -mt-6 grid grid-cols-3 gap-2">
        <div class="bg-white p-3 rounded-2xl shadow text-center border-t-4 border-green-500">
            <p class="text-[10px] text-gray-500">বাজেট</p>
            <h2 id="displayBudget" class="text-sm font-bold text-green-700">৳০</h2>
        </div>
        <div class="bg-white p-3 rounded-2xl shadow text-center border-t-4 border-red-500">
            <p class="text-[10px] text-gray-500">খরচ</p>
            <h2 id="totalExpense" class="text-sm font-bold text-red-600">৳০</h2>
        </div>
        <div class="bg-white p-3 rounded-2xl shadow text-center border-t-4 border-blue-500">
            <p class="text-[10px] text-gray-500">অবশিষ্ট</p>
            <h2 id="remainingBalance" class="text-sm font-bold text-blue-600">৳০</h2>
        </div>
    </section>

    <main class="px-4 mt-6">
        <h3 class="font-bold text-gray-700 mb-4">দৈনিক খরচের তালিকা</h3>
        <div id="expenseList" class="space-y-3"></div>
    </main>

    <button onclick="toggleModal(true)" class="fixed bottom-20 right-6 bg-green-600 text-white w-14 h-14 rounded-full shadow-2xl text-3xl">+</button>

    <div id="expenseModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h2 class="text-lg font-bold mb-4">নতুন খরচ যোগ করুন</h2>
            <input type="date" id="date" class="w-full border p-3 rounded-xl mb-3">
            <input type="number" id="amount" placeholder="টাকার পরিমাণ" class="w-full border p-3 rounded-xl mb-3">
            <input type="text" id="desc" placeholder="বিবরণ (যেমন: বাজার)" class="w-full border p-3 rounded-xl mb-3">
            <div class="flex gap-2">
                <button onclick="toggleModal(false)" class="w-full py-3 bg-gray-200 rounded-xl">বাতিল</button>
                <button onclick="saveData()" class="w-full py-3 bg-green-600 text-white rounded-xl">সেভ করুন</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZ2cE6sxr9T0zb5tXmfumJhwghL_XSJes",
            projectId: "ay-byay-c2d3f",
            // বাকি কনফিগ এখানে ঠিক রাখুন
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // বাজেট সেভ ও লোড
        window.setBudget = async () => {
            const b = document.getElementById('budgetInput').value;
            await setDoc(doc(db, "settings", "budget"), { amount: parseFloat(b) });
            alert("বাজেট আপডেট হয়েছে!");
        };

        onSnapshot(doc(db, "settings", "budget"), (snap) => {
            if(snap.exists()) document.getElementById('displayBudget').innerText = `৳${snap.data().amount}`;
        });

        // UI ও ডাটা লজিক
        window.toggleModal = (show) => document.getElementById('expenseModal').classList.toggle('hidden', !show);

        window.saveData = async () => {
            const date = document.getElementById('date').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const desc = document.getElementById('desc').value;
            if(!date || !amount || !desc) return alert("সব তথ্য দিন!");
            await addDoc(collection(db, "expenses"), { date, amount, desc, createdAt: new Date() });
            toggleModal(false);
        };

        onSnapshot(query(collection(db, "expenses"), orderBy("createdAt", "desc")), (snapshot) => {
            const list = document.getElementById('expenseList');
            let total = 0;
            list.innerHTML = "";
            snapshot.forEach(d => {
                const item = d.data();
                total += item.amount;
                list.innerHTML += `<div class="bg-white p-4 rounded-xl flex justify-between shadow-sm">
                    <div><p class="font-bold">${item.desc}</p><p class="text-xs text-gray-400">${item.date}</p></div>
                    <span class="text-red-500 font-bold">৳${item.amount}</span>
                </div>`;
            });
            document.getElementById('totalExpense').innerText = `৳${total}`;
            const b = parseFloat(document.getElementById('displayBudget').innerText.replace('৳', '')) || 0;
            document.getElementById('remainingBalance').innerText = `৳${b - total}`;
        });
    </script>
</body>
</html>
